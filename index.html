## Семь дней чудес

<img src="./7.jpg" width="1280" height="1702">
</figure>

В повести Анатолия Мошковского 1969 года школьник по имени Боря находит удивительный прибор: теперь он может управлять эмоциями и поведением любого человека... а вы можете сконструировать свою любую эмоцию -- прямо на этом стенде

## Вниз по волшебной реке

<figure>
<img src="./apple.jpg" width="1280" height="1281">
</figure>

"Катись, катись, золотое яблочко, по волшебному блюдечку, покажи мне города и поля, покажи леса и моря...", покажи иллюстрации ребят из детского книжного клуба к неподражаемой сказке Эдуарда Успенского (этим яблоком действительно можно управлять -- попробуйте сами)

## Сказки Астрид Линдгрен

<figure>
<img src="./smoland.jpg" width="1280" height="836">
</figure>

Действие сказок Астрид Линдгрен часто разворачивается 

*в уютных, утопающих в зелени*, как город Юнибакен озорной Мадикен, 

*в идиллических*, как город Лилльчёпинга юного сыщика Калле Блюмквиста,

в то же время *консервативных*, как городок Пеппи Длинныйчулок, 

локациях.

И это всё -- отголосок родной провинции Смоланд писательницы, где она выросла и родилась. Еще пару коротеньких фактов об Астрид Лингрен можно почитать [здесь](http://t.me/skillsclub_kids/213), ну а на этой картине ребята спрятали 9 портретов персонажей её книг. Найдёте?
